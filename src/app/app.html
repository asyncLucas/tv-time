@if (ready()) {
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">tv</span>
        <div class="brand-text">
          <strong>TV&nbsp;Time</strong>
          <small>revival</small>
        </div>
      </div>

      <nav class="nav">
        @for (item of nav; track item.path) {
          <a
            [routerLink]="['/' + item.path]"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
          >
            <span class="ic">{{ item.icon }}</span>
            <span class="lbl">{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="sync-badge" [class.on]="sync.connected()">
        <span class="dot"></span>
        {{ sync.connected() ? sync.peers() + ' peer(s)' : 'local only' }}
      </div>
    </aside>

    <main class="content">
      <router-outlet />
    </main>
  </div>
} @else if (error()) {
  <div class="boot boot-error">
    <h1>Couldn't load your library</h1>
    <p>{{ error() }}</p>
  </div>
} @else {
  <div class="boot">
    <div class="pulse">tv</div>
    <p>Restoring your library…</p>
  </div>
}
